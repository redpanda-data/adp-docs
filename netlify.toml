[build.environment]
NODE_VERSION = "20"

[dev]
  publish = "docs/"
  framework = "#static"

# Markdown URL support
[[redirects]]
from = "/redpanda-adp.md"
to = "/redpanda-adp/home.md"
status = 200

# Redirect old index.md URLs to new .md structure
[[redirects]]
from = "/*/index.md"
to = "/:splat.md"
status = 301
